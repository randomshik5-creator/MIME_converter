<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIME Converter</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%94%84%3C/text%3E%3C/svg%3E">
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("mime-converter-state-v1");
        var theme = "dark";
        if (raw) {
          var state = JSON.parse(raw);
          if (state && state.theme === "light") {
            theme = "light";
          }
        }
        if (theme === "light") {
          document.documentElement.classList.add("theme-light");
        }
      } catch (error) {
        // Ignore and fall back to default dark theme.
      }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <div class="topbar">
      <nav class="mode-switch" aria-label="Режимы">
        <a id="decodeNav" class="mode-link" href="#decode">MIME → текст</a>
        <a id="encodeNav" class="mode-link" href="#encode">Текст → MIME</a>
      </nav>
      <button id="themeToggleButton" class="theme-toggle" type="button" aria-label="Переключить тему" title="Переключить тему">
        <span id="themeToggleIcon" aria-hidden="true">☀</span>
      </button>
    </div>

    <section id="decodePage" class="page-panel">
      <section class="card info-row">
        <div class="status-row">
          <p id="decodeStatus" class="status">Вставьте MIME слева. Справа появится декодированный текст.</p>
        </div>
        <div class="toolbar">
          <button id="decodeSwapButton" type="button">Поменять местами</button>
          <button id="decodeClearButton" type="button">Очистить</button>
        </div>
      </section>

      <section class="grid">
        <article class="card panel">
          <div class="panel-header">
            <h2>MIME</h2>
            <div class="editor-tools">
              <button id="decodeInputPasteButton" class="icon-button" type="button" title="Вставить из буфера" aria-label="Вставить из буфера">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 4h6v2h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2z"/>
                  <path d="M9 4.5h6V7H9z"/>
                  <path d="M9 11h6"/>
                  <path d="M9 15h6"/>
                </svg>
              </button>
              <button id="decodeInputCopyButton" class="icon-button" type="button" title="Скопировать в буфер" aria-label="Скопировать в буфер">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="10" height="10" rx="2"/>
                  <rect x="5" y="5" width="10" height="10" rx="2"/>
                </svg>
              </button>
              <button id="decodeInputFormatButton" class="icon-button" type="button" title="Форматировать JSON" aria-label="Форматировать JSON">
                <span aria-hidden="true">{ }</span>
              </button>
              <button id="decodeInputMinifyButton" class="icon-button" type="button" title="Сжать JSON" aria-label="Сжать JSON">
                <span aria-hidden="true">{-}</span>
              </button>
            </div>
          </div>
          <div id="decodeInputEditor" class="editor" aria-label="MIME input"></div>
        </article>

        <article class="card panel">
          <div class="panel-header">
            <h2>Текст</h2>
            <div class="editor-tools">
              <button id="decodeOutputPasteButton" class="icon-button" type="button" title="Вставить из буфера" aria-label="Вставить из буфера">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 4h6v2h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2z"/>
                  <path d="M9 4.5h6V7H9z"/>
                  <path d="M9 11h6"/>
                  <path d="M9 15h6"/>
                </svg>
              </button>
              <button id="decodeOutputCopyButton" class="icon-button" type="button" title="Скопировать в буфер" aria-label="Скопировать в буфер">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="10" height="10" rx="2"/>
                  <rect x="5" y="5" width="10" height="10" rx="2"/>
                </svg>
              </button>
              <button id="decodeOutputFormatButton" class="icon-button" type="button" title="Форматировать JSON" aria-label="Форматировать JSON">
                <span aria-hidden="true">{ }</span>
              </button>
              <button id="decodeOutputMinifyButton" class="icon-button" type="button" title="Сжать JSON" aria-label="Сжать JSON">
                <span aria-hidden="true">{-}</span>
              </button>
            </div>
          </div>
          <div id="decodeOutputEditor" class="editor" aria-label="Decoded output"></div>
        </article>
      </section>
    </section>

    <section id="encodePage" class="page-panel">
      <section class="card info-row">
        <div class="status-row">
          <p id="encodeStatus" class="status">Вставьте текст слева. Справа появится MIME.</p>
        </div>
        <div class="toolbar">
          <button id="encodeSwapButton" type="button">Поменять местами</button>
          <button id="encodeClearButton" type="button">Очистить</button>
        </div>
      </section>

      <section class="grid">
        <article class="card panel">
          <div class="panel-header">
            <h2>Текст</h2>
            <div class="editor-tools">
              <button id="encodeInputPasteButton" class="icon-button" type="button" title="Вставить из буфера" aria-label="Вставить из буфера">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 4h6v2h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2z"/>
                  <path d="M9 4.5h6V7H9z"/>
                  <path d="M9 11h6"/>
                  <path d="M9 15h6"/>
                </svg>
              </button>
              <button id="encodeInputCopyButton" class="icon-button" type="button" title="Скопировать в буфер" aria-label="Скопировать в буфер">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="10" height="10" rx="2"/>
                  <rect x="5" y="5" width="10" height="10" rx="2"/>
                </svg>
              </button>
              <button id="encodeInputFormatButton" class="icon-button" type="button" title="Форматировать JSON" aria-label="Форматировать JSON">
                <span aria-hidden="true">{ }</span>
              </button>
              <button id="encodeInputMinifyButton" class="icon-button" type="button" title="Сжать JSON" aria-label="Сжать JSON">
                <span aria-hidden="true">{-}</span>
              </button>
            </div>
          </div>
          <div id="encodeInputEditor" class="editor" aria-label="Text input"></div>
        </article>

        <article class="card panel">
          <div class="panel-header">
            <h2>MIME</h2>
            <div class="editor-tools">
              <button id="encodeOutputPasteButton" class="icon-button" type="button" title="Вставить из буфера" aria-label="Вставить из буфера">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 4h6v2h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2z"/>
                  <path d="M9 4.5h6V7H9z"/>
                  <path d="M9 11h6"/>
                  <path d="M9 15h6"/>
                </svg>
              </button>
              <button id="encodeOutputCopyButton" class="icon-button" type="button" title="Скопировать в буфер" aria-label="Скопировать в буфер">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="9" y="9" width="10" height="10" rx="2"/>
                  <rect x="5" y="5" width="10" height="10" rx="2"/>
                </svg>
              </button>
              <button id="encodeOutputFormatButton" class="icon-button" type="button" title="Форматировать JSON" aria-label="Форматировать JSON">
                <span aria-hidden="true">{ }</span>
              </button>
              <button id="encodeOutputMinifyButton" class="icon-button" type="button" title="Сжать JSON" aria-label="Сжать JSON">
                <span aria-hidden="true">{-}</span>
              </button>
            </div>
          </div>
          <div id="encodeOutputEditor" class="editor" aria-label="Encoded output"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="./vendor/monaco/vs/loader.js"></script>
  <script src="./script.js"></script>
</body>
</html>
