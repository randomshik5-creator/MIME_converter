<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIME Converter</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <nav class="mode-switch" aria-label="Режимы">
      <a id="decodeNav" class="mode-link" href="#decode">MIME → текст</a>
      <a id="encodeNav" class="mode-link" href="#encode">Текст → MIME</a>
    </nav>

    <section id="decodePage" class="page-panel">
      <section class="card info-row">
        <div class="status-row">
          <p id="decodeStatus" class="status">Вставьте MIME слева. Справа появится декодированный текст.</p>
        </div>
        <div class="toolbar">
          <button id="decodeSwapButton" type="button">Поменять местами</button>
          <button id="decodeClearButton" type="button">Очистить</button>
        </div>
      </section>

      <section class="grid">
        <article class="card panel">
          <div class="panel-header">
            <h2>MIME</h2>
          </div>
          <div id="decodeInputEditor" class="editor" aria-label="MIME input"></div>
        </article>

        <article class="card panel">
          <div class="panel-header">
            <h2>Текст</h2>
          </div>
          <div id="decodeOutputEditor" class="editor" aria-label="Decoded output"></div>
        </article>
      </section>
    </section>

    <section id="encodePage" class="page-panel">
      <section class="card info-row">
        <div class="status-row">
          <p id="encodeStatus" class="status">Вставьте текст слева. Справа появится MIME.</p>
        </div>
        <div class="toolbar">
          <button id="encodeSwapButton" type="button">Поменять местами</button>
          <button id="encodeClearButton" type="button">Очистить</button>
        </div>
      </section>

      <section class="grid">
        <article class="card panel">
          <div class="panel-header">
            <h2>Текст</h2>
          </div>
          <div id="encodeInputEditor" class="editor" aria-label="Text input"></div>
        </article>

        <article class="card panel">
          <div class="panel-header">
            <h2>MIME</h2>
          </div>
          <div id="encodeOutputEditor" class="editor" aria-label="Encoded output"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="./vendor/monaco/vs/loader.js"></script>
  <script src="./script.js"></script>
</body>
</html>
